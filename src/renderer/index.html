<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; frame-src proto-garden: https: http:; img-src 'self' proto-garden: data: blob:;">
  <title>ProtoGarden</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/gallery.css">
  <link rel="stylesheet" href="styles/canvas.css">
</head>
<body>
  <div id="app">
    <!-- Welcome Screen -->
    <div id="view-welcome" class="view">
      <div class="welcome-screen">
        <div class="welcome-logo">Proto<span>Garden</span></div>
        <div class="welcome-subtitle">
          プロトタイプやワイヤーフレームを自由なキャンバスに並べて比較しよう
        </div>
        <button class="welcome-btn" id="btn-pick-folder">
          保存先フォルダを選択
        </button>
      </div>
    </div>

    <!-- Gallery View -->
    <div id="view-gallery" class="view">
      <div class="gallery-header">
        <div class="gallery-title">Workspaces</div>
        <div class="gallery-actions">
          <button class="btn-change-folder" id="btn-import-workspace">ファイルから読込</button>
          <button class="btn-change-folder" id="btn-change-folder">保存先を変更</button>
          <button class="btn-new-workspace" id="btn-new-workspace">+ 新規ワークスペース</button>
        </div>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <!-- Canvas View -->
    <div id="view-canvas" class="view">
      <div class="canvas-toolbar">
        <div class="toolbar-left">
          <button class="btn-back" id="btn-back" title="ギャラリーに戻る">&larr;</button>
          <span class="toolbar-workspace-name" id="toolbar-workspace-name"></span>
        </div>
        <div class="toolbar-center">
          <button class="btn-toolbar" id="btn-add-text">+ Text</button>
          <button class="btn-toolbar" id="btn-add-note">+ Note</button>
          <button class="btn-toolbar" id="btn-add-image">+ Image</button>
          <button class="btn-toolbar" id="btn-add-html">+ HTML</button>
          <button class="btn-toolbar" id="btn-add-url">+ URL</button>
        </div>
        <div class="toolbar-right">
          <button class="zoom-indicator" id="zoom-indicator" title="クリックでリセット">100%</button>
        </div>
      </div>
      <div class="canvas-viewport" id="canvas-viewport">
        <div class="canvas-container" id="canvas-container"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-title" id="modal-title"></div>
      <input class="modal-input" id="modal-input" type="text">
      <div class="modal-actions">
        <button class="modal-btn cancel" id="modal-cancel">キャンセル</button>
        <button class="modal-btn confirm" id="modal-confirm">作成</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="gallery/gallery.js"></script>
  <script src="canvas/action-history.js"></script>
  <script src="canvas/smart-guide.js"></script>
  <script src="canvas/node-base.js"></script>
  <script src="canvas/node-text.js"></script>
  <script src="canvas/node-image.js"></script>
  <script src="canvas/node-note.js"></script>
  <script src="canvas/node-group.js"></script>
  <script src="canvas/node-html.js"></script>
  <script src="canvas/node-url.js"></script>
  <script src="canvas/connection-manager.js"></script>
  <script src="canvas/canvas.js"></script>
  <script src="canvas/toolbar.js"></script>
</body>
</html>
